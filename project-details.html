<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Details - Unity Collective</title>

  <link rel="stylesheet" href="css/main.css" />
</head>

<body>
  <div id="header"></div>

  <main class="container">
    <a href="projects.html" class="back-link">← Back to all projects</a>

    <section class="project-detail-layout">
      <div class="project-gallery">
        <div class="project-detail-images"></div>
      </div>

      <div class="project-detail-content">
        <h1>Project Title</h1>
        <p>By Student Name(s)</p>
        <p>Semester 1, 2024</p>
        <p>Category Name</p>
        <p>Programme: [Programme Name]</p>

        <div class="detail-divider"></div>

        <section class="detail-section">
          <h2>OVERVIEW</h2>
          <div class="overview-box"></div>
        </section>

        <section class="detail-section">
          <h2>PROJECT DOCUMENTS</h2>
          <div class="document-box">
            Document Title.pdf
          </div>
        </section>

        <section class="detail-section">
          <h2>TAGS</h2>
          <div class="tag-list">
            <span>Tag 1</span>
            <span>Tag 2</span>
            <span>Tag 3</span>
            <span>Tag 4</span>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="js/data/projects.js"></script>
  <script src="js/data/project-storage.js"></script>
  <script src="js/header-footer.js"></script>
  <script src="js/pages/project-details.js"></script>
</body>

</html>
